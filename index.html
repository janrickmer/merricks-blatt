:root{
  --paper:#F5EFE0; --ink:#1A1A1A; --ink-soft:#4A4A4A;
  --rule:#9A8F77; --accent:#8A1C1C; --credit:#8A7F68;
}
*{box-sizing:border-box}
html,body{margin:0;height:100%;background:var(--paper)}
body{font-family:Georgia,'Times New Roman',serif;overflow:hidden}

/* ---- Geruest ---- */
#shell{display:flex;flex-direction:column;height:100%}
#topbar{
  display:flex;align-items:center;justify-content:space-between;
  padding:10px 12px 8px 16px;background:var(--paper);flex:0 0 auto;
}
#brand{font-size:24px;font-weight:bold;color:var(--ink);letter-spacing:.06em}
#menuBtn{
  font:inherit;font-size:14px;letter-spacing:.18em;color:var(--ink);
  background:none;border:none;cursor:pointer;padding:6px 10px;border-radius:2px;
}
#menuBtn:active{background:rgba(0,0,0,.06)}
.line-ink{height:3px;background:var(--ink);flex:0 0 auto}
.line-gap{height:2px;background:var(--paper);flex:0 0 auto}
.line-thin{height:1px;background:var(--ink);flex:0 0 auto}
#viewer{flex:1 1 auto;width:100%;border:none;background:var(--paper)}

/* ---- Verdunkelung ---- */
#scrim{
  position:fixed;inset:0;background:rgba(0,0,0,.5);
  opacity:0;pointer-events:none;transition:opacity .26s ease;z-index:40;
}
#scrim.open{opacity:1;pointer-events:auto}

/* ---- Menue: vollhohes Panel, slidet von rechts ---- */
#menu{
  position:fixed;top:0;right:0;height:100%;
  width:min(84vw,420px);
  background:var(--paper);
  border-left:3px solid var(--ink);
  box-shadow:-10px 0 28px rgba(0,0,0,.28);
  transform:translateX(100%);
  transition:transform .28s cubic-bezier(.22,.61,.36,1);
  z-index:50;display:flex;flex-direction:column;
}
#menu.open{transform:translateX(0)}
#menuHead{padding:18px 22px 4px}
#menuTitle{text-align:center;font-size:30px;font-weight:bold;letter-spacing:.14em;color:var(--ink);line-height:1}
#menuHeadRule{height:1px;background:var(--ink);margin-top:8px}
#menuDateline{text-align:center;font-style:italic;color:var(--ink-soft);font-size:13px;margin-top:6px}
#menuItems{flex:1 1 auto;overflow-y:auto;padding:0 22px}
.item{
  display:block;width:100%;text-align:left;background:none;border:none;
  cursor:pointer;padding:16px 0;font-family:inherit;
}
.item:active{background:rgba(0,0,0,.05)}
.item .kicker{display:block;font-size:11px;letter-spacing:.2em;color:var(--accent)}
.item .head{display:block;font-size:22px;font-weight:bold;color:var(--ink);margin-top:3px}
.item .sub{display:block;font-size:13px;font-style:italic;color:var(--ink-soft);margin-top:3px}
.sep{height:1px;background:var(--rule)}
#itemClose{
  flex:0 0 auto;width:100%;background:none;border:none;border-top:2px solid var(--ink);
  cursor:pointer;padding:14px 22px;font-family:inherit;
  font-size:15px;letter-spacing:.1em;color:var(--ink);text-align:center;
}
#itemClose:active{background:rgba(0,0,0,.05)}

/* ---- Startbildschirm ---- */
#splash{
  position:fixed;inset:0;background:var(--paper);z-index:100;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  transition:opacity .4s ease;
}
#splash.hide{opacity:0;pointer-events:none}
#splashTitle{
  font-family:'UnifrakturMaguntia',Georgia,serif;color:var(--ink);
  font-size:clamp(40px,13vw,76px);line-height:1;text-align:center;padding:0 18px;
}
#splashCredit{margin-top:16px;font-size:14px;color:var(--credit);letter-spacing:.04em}
</style>
</head>

  var cache = {};
  function decode(b64){
    var bin = atob(b64);
    var bytes = new Uint8Array(bin.length);
    for (var i=0;i<bin.length;i++) bytes[i] = bin.charCodeAt(i);
    return new TextDecoder("utf-8").decode(bytes);
  }
  function pageHtml(key){
    if (!cache[key]) cache[key] = decode(DATA[key]);
    return cache[key];
  }

  var viewer  = document.getElementById("viewer");
  var menu    = document.getElementById("menu");
  var scrim   = document.getElementById("scrim");
  var current = "blatt";

  function showPage(key){
    current = key;
    viewer.srcdoc = pageHtml(key);
    updateSwitch();
  }
  function reloadPage(){
    var html = pageHtml(current);
    viewer.srcdoc = "";                 // erst leeren, damit ein echtes Neuladen erfolgt
    requestAnimationFrame(function(){ viewer.srcdoc = html; });
  }
  // Wechsel-Eintrag zeigt immer die jeweils ANDERE Seite an
  function updateSwitch(){
    var onBlatt = (current === "blatt");
    document.getElementById("switchTitle").textContent = onBlatt ? "Merricks Globus" : "Merricksblatt";
    document.getElementById("switchSub").textContent   = onBlatt
      ? "Zur 3-D-Globusansicht mit Nachrichten"
      : "Zurück zur Zeitungsausgabe";
  }

  function setDateline(){
    try {
      var s = new Date().toLocaleDateString("de-DE",
        {weekday:"long", day:"numeric", month:"long", year:"numeric"});
      document.getElementById("menuDateline").textContent = "Menü · " + s;
    } catch(e){ document.getElementById("menuDateline").textContent = "Menü"; }
  }
  function openMenu(){
    updateSwitch(); setDateline();
    menu.classList.add("open"); scrim.classList.add("open");
    menu.setAttribute("aria-hidden","false");
  }
  function closeMenu(){
    menu.classList.remove("open"); scrim.classList.remove("open");
    menu.setAttribute("aria-hidden","true");
  }

  document.getElementById("menuBtn").addEventListener("click", openMenu);
  document.getElementById("itemClose").addEventListener("click", closeMenu);
  scrim.addEventListener("click", closeMenu);
  document.addEventListener("keydown", function(e){ if (e.key === "Escape") closeMenu(); });

  document.getElementById("itemSwitch").addEventListener("click", function(){
    closeMenu();
    showPage(current === "blatt" ? "globus" : "blatt");
  });
  document.getElementById("itemReload").addEventListener("click", function(){
    closeMenu(); reloadPage();
  });
  document.getElementById("itemLinktree").addEventListener("click", function(){
    closeMenu(); window.open("https://linktr.ee/feindt", "_blank", "noopener");
  });

  // Startseite hinter dem Splash laden, Splash nach 2 Sekunden ausblenden
  function start(){
    showPage("blatt");
    setTimeout(function(){ document.getElementById("splash").classList.add("hide"); }, 2000);
  }
  if (document.readyState === "complete") start();
  else window.addEventListener("load", start);
})();
</script>
